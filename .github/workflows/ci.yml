name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      ARTIFACTS_API_KEY: ci-test-key
      DATA_DIR: /tmp/artifacts-data
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Boot server
        run: |
          node server.js &
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/healthz && break
            sleep 0.5
          done
      - name: Smoke test API
        run: bash .github/workflows/smoke.sh http://localhost:3000 ci-test-key

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t artifacts-host .
      - name: Smoke test container
        run: |
          docker run -d --name artifacts -p 3000:3000 \
            -e ARTIFACTS_API_KEY=ci-test-key artifacts-host
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/healthz && break
            sleep 0.5
          done
          bash .github/workflows/smoke.sh http://localhost:3000 ci-test-key
      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag artifacts-host ghcr.io/${{ github.repository_owner }}/artifacts:latest
          docker tag artifacts-host ghcr.io/${{ github.repository_owner }}/artifacts:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/artifacts:latest
          docker push ghcr.io/${{ github.repository_owner }}/artifacts:${{ github.sha }}
