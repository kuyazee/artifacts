<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>{{TITLE}}</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f8fa;
    --fg: #1f2328;
    --muted: #59636e;
    --border: #d1d9e0;
    --card: #ffffff;
    --accent: #0969da;
    --error: #cf222e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --card: #161b22;
      --accent: #4493f8;
      --error: #ff7b72;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100%; padding: 24px;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #card {
    width: 100%; max-width: 340px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
  }
  #card h1 {
    margin: 0 0 4px; font-size: 16px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #card p { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  input {
    width: 100%; padding: 8px 10px; margin-bottom: 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--fg);
    font-size: 14px; font-family: inherit;
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent); }
  button {
    width: 100%; padding: 9px 12px; border: 0; border-radius: 6px;
    background: var(--accent); color: #fff;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  #error { min-height: 18px; margin: 10px 0 0; font-size: 13px; color: var(--error); }
  #card.shake { animation: shake .3s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>
  <form id="card" autocomplete="off">
    <h1>{{TITLE}}</h1>
    <p>This artifact is protected.</p>
    <label for="pw">{{LABEL}}</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus>
    <button id="submit" type="submit">Unlock</button>
    <p id="error"></p>
  </form>

  <script>
    var UNLOCK_URL = '/a/{{SLUG}}/unlock';
    var form = document.getElementById('card');
    var pw = document.getElementById('pw');
    var btn = document.getElementById('submit');
    var err = document.getElementById('error');

    function shake(msg) {
      err.textContent = msg;
      form.classList.remove('shake');
      void form.offsetWidth;
      form.classList.add('shake');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!pw.value) return;
      btn.disabled = true;
      err.textContent = '';
      fetch(UNLOCK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw.value }),
      }).then(function (res) {
        if (res.ok) { location.reload(); return; }
        return res.json().catch(function () { return {}; }).then(function (d) {
          btn.disabled = false;
          shake(d.error || 'Incorrect password');
          pw.value = '';
          pw.focus();
        });
      }).catch(function () {
        btn.disabled = false;
        shake('Network error');
      });
    });
  </script>
</body>
</html>
