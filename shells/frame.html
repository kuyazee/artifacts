<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>{{TITLE}}</title>
<style>
  :root {
    color-scheme: light dark;
    --bar-bg: #f6f8fa;
    --bar-fg: #1f2328;
    --bar-muted: #59636e;
    --bar-border: #d1d9e0;
    --bar-hover: #eaeef2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bar-bg: #161b22;
      --bar-fg: #e6edf3;
      --bar-muted: #8b949e;
      --bar-border: #30363d;
      --bar-hover: #21262d;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: flex; flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  #bar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    height: 44px; padding: 0 12px;
    background: var(--bar-bg); color: var(--bar-fg);
    border-bottom: 1px solid var(--bar-border);
  }
  #title {
    flex: 1 1 auto; min-width: 0;
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #bar button {
    flex: 0 0 auto;
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--bar-border); background: transparent;
    color: var(--bar-muted); font-size: 13px; font-family: inherit; cursor: pointer;
  }
  #bar button:hover { background: var(--bar-hover); color: var(--bar-fg); }

  #frame { flex: 1 1 auto; width: 100%; border: 0; }

  /* Floating pill shown when the bar is hidden. */
  #reveal {
    display: none;
    position: fixed; top: 8px; right: 8px; z-index: 2;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--bar-border); background: var(--bar-bg);
    color: var(--bar-muted); font-size: 13px; font-family: inherit; cursor: pointer;
    opacity: 0.7; transition: opacity .15s;
  }
  #reveal:hover { opacity: 1; color: var(--bar-fg); }

  body.frame-hidden #bar { display: none; }
  body.frame-hidden #reveal { display: inline-flex; }
</style>
</head>
<body>
  <div id="bar">
    <span id="title">{{TITLE}}</span>
    <button id="copy" type="button" title="Copy link to this artifact">Copy link</button>
    <button id="hide" type="button" title="Hide this frame">&#9650; Hide</button>
  </div>

  <iframe id="frame" src="{{RAW_URL}}" title="{{TITLE}}"></iframe>

  <button id="reveal" type="button" title="Show the frame">&#9660; Frame</button>

  <script>
    var STORE_KEY = 'artifactFrameHidden';

    function setHidden(hidden) {
      document.body.classList.toggle('frame-hidden', hidden);
      try { localStorage.setItem(STORE_KEY, hidden ? '1' : '0'); } catch (e) {}
    }

    try {
      if (localStorage.getItem(STORE_KEY) === '1') document.body.classList.add('frame-hidden');
    } catch (e) {}

    document.getElementById('hide').addEventListener('click', function () { setHidden(true); });
    document.getElementById('reveal').addEventListener('click', function () { setHidden(false); });

    document.getElementById('copy').addEventListener('click', function () {
      var url = location.origin + location.pathname; // canonical URL, no ?raw=1
      var btn = this;
      function done() {
        var prev = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(function () { btn.textContent = prev; }, 1200);
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(done).catch(done);
      } else {
        done();
      }
    });
  </script>
</body>
</html>
