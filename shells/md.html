<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>{{TITLE}}</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 80px;
    color: #1f2328;
    background: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e6edf3; background: #0d1117; }
    a { color: #58a6ff; }
    pre, code { background: #161b22; }
    blockquote { color: #8b949e; border-left-color: #30363d; }
    table th, table td { border-color: #30363d; }
    hr { border-color: #30363d; }
  }
  a { color: #0969da; }
  pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
  code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; line-height: 1.5; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  pre code { padding: 0; background: none; }
  blockquote { margin: 0; padding-left: 16px; border-left: 4px solid #d1d9e0; color: #59636e; }
  img { max-width: 100%; }
  table { border-collapse: collapse; display: block; overflow-x: auto; }
  table th, table td { border: 1px solid #d1d9e0; padding: 6px 13px; }
  hr { border: none; border-top: 1px solid #d1d9e0; margin: 24px 0; }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
