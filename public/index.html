<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>artifacts</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; min-height: 100vh;
    background: #0d1117; color: #e6edf3;
  }
  input, select, textarea {
    padding: 8px 10px; border-radius: 6px;
    border: 1px solid #30363d; background: #161b22; color: #e6edf3;
    font-size: 14px; font-family: inherit;
  }
  button {
    padding: 8px 16px; border: none; border-radius: 6px;
    background: #238636; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #2ea043; }
  button.ghost { background: transparent; border: 1px solid #30363d; color: #7d8590; font-weight: 400; }
  button.ghost:hover { color: #e6edf3; border-color: #7d8590; background: transparent; }

  /* ---- lock screen ---- */
  #lock {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  #lock .card {
    width: 320px; padding: 32px; border: 1px solid #21262d; border-radius: 12px;
    background: #161b22; text-align: center;
  }
  #lock h1 { font-size: 22px; margin: 0 0 4px; }
  #lock p { color: #7d8590; font-size: 13px; margin: 0 0 20px; }
  #lock input { width: 100%; text-align: center; margin-bottom: 12px; }
  #lock button { width: 100%; }
  #lockError { color: #f85149; font-size: 13px; margin-top: 10px; min-height: 18px; }
  .shake { animation: shake .35s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); } 75% { transform: translateX(8px); }
  }

  /* ---- app ---- */
  #app { display: none; max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; }
  header h1 { font-size: 20px; margin: 0; }
  header h1 span { color: #7d8590; font-weight: 400; font-size: 14px; }

  #drop {
    border: 2px dashed #30363d; border-radius: 12px;
    padding: 48px 20px; text-align: center; cursor: pointer;
    color: #7d8590; transition: border-color .15s, background .15s;
  }
  #drop.over { border-color: #2ea043; background: #12261e; color: #e6edf3; }
  #drop strong { color: #e6edf3; }
  #drop .hint { font-size: 12px; margin-top: 8px; }

  #results { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .result {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px; font-size: 14px;
    background: #12261e; border: 1px solid #238636;
  }
  .result.err { background: #2d1215; border-color: #da3633; }
  .result .name { color: #7d8590; font-size: 13px; white-space: nowrap; }
  .result a { color: #58a6ff; word-break: break-all; flex: 1; }
  .result .msg { flex: 1; color: #f85149; }
  .result button { padding: 4px 10px; font-size: 12px; }

  details { margin-top: 28px; }
  summary { cursor: pointer; color: #7d8590; font-size: 14px; user-select: none; }
  .paste-form { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .paste-form .row { display: flex; gap: 10px; }
  .paste-form .row > * { flex: 1; }
  .paste-form textarea { min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  .paste-form button { align-self: flex-start; }

  #list { margin-top: 32px; }
  #list h2 { font-size: 14px; color: #7d8590; }
  #list table { width: 100%; border-collapse: collapse; font-size: 13px; }
  #list td, #list th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #21262d; }
  #list a { color: #58a6ff; text-decoration: none; }
  #list .del { color: #f85149; cursor: pointer; background: none; border: none; padding: 0; font-size: 13px; font-weight: 400; }
  #list .del:hover { background: none; text-decoration: underline; }
  #list .act { color: #7d8590; cursor: pointer; background: none; border: none; padding: 0; font-size: 13px; font-weight: 400; }
  #list .act:hover { background: none; color: #e6edf3; text-decoration: underline; }
</style>
</head>
<body>

<div id="lock">
  <div class="card" id="lockCard">
    <h1>artifacts</h1>
    <p>Enter API key to unlock</p>
    <input id="lockKey" type="password" placeholder="API key" autofocus>
    <button id="unlock">Unlock</button>
    <div id="lockError"></div>
  </div>
</div>

<div id="app">
  <header>
    <h1>artifacts <span>— drop to publish</span></h1>
    <button class="ghost" id="logout">Lock</button>
  </header>

  <div id="drop">
    <strong>Drag &amp; drop files here</strong> — or click to browse<br>
    <div class="hint">.html · .jsx · .tsx · .md — published instantly, URL copied per file</div>
  </div>
  <input id="file" type="file" accept=".html,.htm,.jsx,.tsx,.md,.markdown" multiple hidden>

  <div id="results"></div>

  <details>
    <summary>Paste content instead</summary>
    <div class="paste-form">
      <div class="row">
        <select id="type">
          <option value="html">html</option>
          <option value="jsx">jsx</option>
          <option value="tsx">tsx</option>
          <option value="md">md</option>
        </select>
        <input id="slug" placeholder="custom slug (optional)">
        <input id="title" placeholder="title (optional)">
      </div>
      <textarea id="content" placeholder="Paste HTML, a React component with a default export, or Markdown…" spellcheck="false"></textarea>
      <button id="publish">Publish</button>
    </div>
  </details>

  <div id="list">
    <h2>Published artifacts</h2>
    <table><tbody id="rows"></tbody></table>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  let KEY = localStorage.getItem('artifactsKey') || '';

  const headers = () => ({
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + KEY,
  });

  const TYPE_BY_EXT = {
    html: 'html', htm: 'html',
    jsx: 'jsx', tsx: 'tsx',
    md: 'md', markdown: 'md',
  };

  // ---- lock / unlock ----

  async function validateKey(key) {
    try {
      const res = await fetch('/api/artifacts', { headers: { 'Authorization': 'Bearer ' + key } });
      return res.ok;
    } catch { return false; }
  }

  function showApp() {
    $('lock').style.display = 'none';
    $('app').style.display = 'block';
    loadList();
  }

  function showLock() {
    $('lock').style.display = 'flex';
    $('app').style.display = 'none';
    $('lockKey').value = '';
    $('lockKey').focus();
  }

  async function tryUnlock() {
    const key = $('lockKey').value.trim();
    if (!key) return;
    $('lockError').textContent = '';
    if (await validateKey(key)) {
      KEY = key;
      localStorage.setItem('artifactsKey', key);
      showApp();
    } else {
      $('lockError').textContent = 'Wrong key';
      $('lockCard').classList.remove('shake');
      void $('lockCard').offsetWidth;
      $('lockCard').classList.add('shake');
    }
  }

  $('unlock').addEventListener('click', tryUnlock);
  $('lockKey').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
  $('logout').addEventListener('click', () => {
    KEY = '';
    localStorage.removeItem('artifactsKey');
    showLock();
  });

  // ---- publish helpers ----

  function slugify(filename) {
    const base = filename.replace(/\.[^.]+$/, '');
    let s = base.toLowerCase().replace(/[^a-z0-9-]+/g, '-').replace(/^-+|-+$/g, '');
    if (s.length < 3) s = s + '-' + Math.random().toString(36).slice(2, 6);
    return s.slice(0, 64);
  }

  async function publish(body) {
    const res = await fetch('/api/artifacts', { method: 'POST', headers: headers(), body: JSON.stringify(body) });
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  }

  function addResult(name, urlOrError, ok) {
    const div = document.createElement('div');
    div.className = 'result' + (ok ? '' : ' err');
    if (ok) {
      div.innerHTML = '<span class="name"></span><a target="_blank"></a><button>Copy</button>';
      div.querySelector('.name').textContent = name;
      const a = div.querySelector('a');
      a.href = urlOrError; a.textContent = urlOrError;
      div.querySelector('button').addEventListener('click', () => navigator.clipboard.writeText(urlOrError));
    } else {
      div.innerHTML = '<span class="name"></span><span class="msg"></span>';
      div.querySelector('.name').textContent = name;
      div.querySelector('.msg').textContent = urlOrError;
    }
    $('results').prepend(div);
  }

  async function publishFile(file) {
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const type = TYPE_BY_EXT[ext];
    if (!type) return addResult(file.name, 'Unsupported type .' + ext + ' (html/jsx/tsx/md only)', false);

    const content = await file.text();
    let slug = slugify(file.name);
    let r = await publish({ content, type, slug, title: file.name });
    if (r.status === 409) {
      slug = slug.slice(0, 59) + '-' + Math.random().toString(36).slice(2, 6);
      r = await publish({ content, type, slug, title: file.name });
    }
    if (r.ok) {
      addResult(file.name, r.data.url, true);
      navigator.clipboard.writeText(r.data.url).catch(() => {});
      loadList();
    } else {
      addResult(file.name, r.data.error || ('HTTP ' + r.status), false);
    }
  }

  // ---- drag & drop ----

  const drop = $('drop');
  drop.addEventListener('click', () => $('file').click());
  $('file').addEventListener('change', () => {
    [...$('file').files].forEach(publishFile);
    $('file').value = '';
  });

  let dragDepth = 0;
  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragDepth++;
    drop.classList.add('over');
  });
  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    if (--dragDepth <= 0) { dragDepth = 0; drop.classList.remove('over'); }
  });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragDepth = 0;
    drop.classList.remove('over');
    if ($('app').style.display === 'none' || !$('app').style.display) return;
    [...e.dataTransfer.files].forEach(publishFile);
  });

  // ---- paste form ----

  $('publish').addEventListener('click', async () => {
    const body = { content: $('content').value, type: $('type').value };
    if ($('slug').value) body.slug = $('slug').value;
    if ($('title').value) body.title = $('title').value;
    const r = await publish(body);
    if (r.ok) {
      addResult('pasted ' + body.type, r.data.url, true);
      navigator.clipboard.writeText(r.data.url).catch(() => {});
      $('content').value = '';
      loadList();
    } else {
      addResult('pasted ' + body.type, r.data.error || ('HTTP ' + r.status), false);
    }
  });

  // ---- list ----

  async function loadList() {
    try {
      const res = await fetch('/api/artifacts', { headers: headers() });
      if (!res.ok) return;
      const items = await res.json();
      $('rows').innerHTML = '';
      for (const a of items) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td><a target="_blank"></a></td><td></td><td></td><td></td>' +
          '<td><button class="ghost small">Copy</button></td>' +
          '<td><button class="act ren">rename</button></td>' +
          '<td><button class="del">delete</button></td>';
        const link = tr.querySelector('a');
        link.href = '/a/' + a.slug; link.textContent = a.slug;
        tr.children[1].textContent = a.type;
        tr.children[2].textContent = a.title || '';
        tr.children[3].textContent = (a.updatedAt || '').slice(0, 16).replace('T', ' ');
        tr.querySelector('.ghost').addEventListener('click', () =>
          navigator.clipboard.writeText(location.origin + '/a/' + a.slug));
        tr.querySelector('.ren').addEventListener('click', async () => {
          const ns = prompt('New slug for "' + a.slug + '"', a.slug);
          if (!ns || ns === a.slug) return;
          const res = await fetch('/api/artifacts/' + a.slug, {
            method: 'PATCH', headers: headers(), body: JSON.stringify({ slug: ns }),
          });
          if (!res.ok) {
            const d = await res.json().catch(() => ({}));
            alert(d.error || 'rename failed');
          }
          loadList();
        });
        tr.querySelector('.del').addEventListener('click', async () => {
          await fetch('/api/artifacts/' + a.slug, { method: 'DELETE', headers: headers() });
          loadList();
        });
        $('rows').appendChild(tr);
      }
    } catch {}
  }

  // ---- boot ----

  (async () => {
    if (KEY && await validateKey(KEY)) showApp();
    else showLock();
  })();
</script>
</body>
</html>
