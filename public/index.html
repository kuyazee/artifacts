<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>artifacts</title>
<style>
  :root {
    color-scheme: dark;
    --espresso: #221610;
    --cocoa: #2C1F17;
    --cocoa-hi: #392A1D;
    --field: #241811;
    --rim: #4A3624;
    --rim-soft: #382A1D;
    --sand: #F3E9DA;
    --taupe: #B89F86;
    --taupe-dim: #A8937B;
    --cream: #ECD6A2;
    --cream-hi: #F6E4B9;
    --rose: #E4A6AD;
    --rose-tint: rgba(228, 166, 173, .14);
    --brick: #D8836A;
    --danger-bg: #2F1C17;
    --danger-rim: #5A3327;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
    min-height: 100vh;
    background: var(--espresso); color: var(--sand);
    background-image: radial-gradient(1100px 460px at 50% -8%, #2E1F14 0%, transparent 72%);
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--rose); text-decoration: none; }
  a:hover { color: var(--cream); }

  input, select, textarea {
    padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--rim); background: var(--field); color: var(--sand);
    font-size: 14px; font-family: inherit;
  }
  input::placeholder, textarea::placeholder { color: var(--taupe-dim); }
  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--rose); outline-offset: 1px; border-color: var(--rose);
  }
  :focus-visible { outline: 2px solid var(--rose); outline-offset: 2px; }

  /* base button = primary (cream on espresso) */
  button {
    padding: 9px 18px; border: none; border-radius: 8px;
    background: var(--cream); color: #2A1C12;
    font-size: 14px; font-weight: 700; letter-spacing: .01em;
    font-family: inherit; cursor: pointer; transition: background .12s;
  }
  button:hover { background: var(--cream-hi); }
  button.busy { opacity: .65; pointer-events: none; }

  /* palmette mark — rose leaf, cream stem (echoes the Ibiza print) */
  .mark { display: block; }
  .mark ellipse { fill: var(--rose); }
  .mark .stem { stroke: var(--cream); stroke-width: 1.6; stroke-linecap: round; fill: none; }

  /* ---- lock screen ---- */
  #lock { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  #lock .card {
    width: 340px; max-width: 100%; padding: 34px 30px;
    border: 1px solid var(--rim); border-radius: 16px; background: var(--cocoa);
    text-align: center; box-shadow: 0 24px 64px -34px #000;
  }
  #lock .mark { width: 34px; height: 34px; margin: 0 auto 12px; }
  #lock h1 { font-size: 22px; margin: 0 0 4px; color: var(--cream); letter-spacing: -.01em; }
  #lock p { color: var(--taupe); font-size: 13px; margin: 0 0 20px; }
  #lock label {
    display: block; text-align: left; font-size: 11px; font-weight: 600;
    letter-spacing: .05em; text-transform: uppercase; color: var(--taupe);
    margin: 0 0 5px 2px;
  }
  #lock input { width: 100%; margin-bottom: 12px; }
  #lock button { width: 100%; }
  #lockError { color: var(--brick); font-size: 13px; margin-top: 10px; min-height: 18px; }
  .shake { animation: shake .35s; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); } 75% { transform: translateX(8px); }
  }

  /* ---- app ---- */
  #app { display: none; max-width: 900px; margin: 0 auto; padding: 36px 20px 80px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .mark { width: 30px; height: 30px; flex: none; }
  .wordmark { display: block; font-size: 21px; font-weight: 700; letter-spacing: -.02em; color: var(--cream); line-height: 1; }
  .tagline { display: block; font-size: 12px; color: var(--taupe-dim); margin-top: 3px; letter-spacing: .02em; }

  #drop {
    border: 1.5px dashed var(--rim); border-radius: 14px; padding: 44px 20px; text-align: center;
    cursor: pointer; color: var(--taupe);
    background: linear-gradient(#2A1D14, #251811);
    transition: border-color .15s, background .15s, color .15s;
  }
  #drop:hover { border-color: var(--taupe); }
  #drop.over { border-color: var(--rose); background: var(--rose-tint); color: var(--sand); }
  #drop strong { color: var(--sand); font-weight: 600; }
  #drop .hint { font-size: 12px; margin-top: 8px; color: var(--taupe-dim); }

  #results { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .result {
    display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px; font-size: 14px;
    background: #25281C; border: 1px solid #3F5233;
  }
  .result.err { background: var(--danger-bg); border-color: var(--danger-rim); }
  .result .name { color: var(--taupe); font-size: 12px; white-space: nowrap; }
  .result a { flex: 1; word-break: break-all; }
  .result .msg { flex: 1; color: var(--brick); }
  .result button { padding: 5px 11px; font-size: 12px; }

  /* ---- app bar actions ---- */
  .bar-actions { display: flex; align-items: center; gap: 6px; position: relative; }
  .iconbtn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    height: 40px; min-width: 40px; padding: 0 9px;
    background: transparent; border: 1px solid var(--rim); border-radius: 9px;
    color: var(--taupe); cursor: pointer; transition: color .12s, border-color .12s, background .12s, transform .06s;
  }
  .iconbtn:hover { color: var(--sand); border-color: var(--taupe); }
  .iconbtn:active { transform: translateY(1px); }
  .iconbtn .ic { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .iconbtn.primary { color: var(--cream); }
  .iconbtn.primary:hover { background: var(--rose-tint); border-color: var(--rose); color: var(--cream); }
  .iconbtn .label { font-size: 13px; font-weight: 600; padding-right: 3px; }
  .iconbtn.on { color: var(--cream); border-color: var(--rose); background: var(--rose-tint); }
  @media (max-width: 560px) { .iconbtn .label { display: none; } .iconbtn.primary { padding: 0 9px; } }

  /* ---- anchored dropdown popover ---- */
  .scrim { position: fixed; inset: 0; z-index: 40; background: transparent; visibility: hidden; }
  .scrim.open { visibility: visible; }
  .popover {
    position: absolute; top: calc(100% + 10px); right: 0; z-index: 50;
    width: 300px; transform-origin: top right;
    background: var(--cocoa-hi); border: 1px solid var(--rim); border-radius: 14px;
    box-shadow: 0 26px 60px -28px #000, 0 2px 0 rgba(0,0,0,.2);
    opacity: 0; transform: translateY(-6px) scale(.98); pointer-events: none;
    transition: opacity .14s ease, transform .14s cubic-bezier(.32,.72,0,1);
  }
  .popover.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .popover::before {
    content: ""; position: absolute; top: -6px; width: 11px; height: 11px;
    background: var(--cocoa-hi); border-left: 1px solid var(--rim); border-top: 1px solid var(--rim);
    transform: rotate(45deg);
  }
  #composePop { width: 440px; }
  #keysPop { width: 360px; }
  #composePop::before { right: 84px; }
  #settingsPop::before { right: 84px; }
  #keysPop::before { right: 47px; }
  @media (max-width: 480px) {
    .popover, #composePop { position: fixed; top: 74px; right: 12px; left: 12px; width: auto; }
    .popover::before { display: none; }
  }
  .pop-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
  .pop-head h3 { margin: 0; font-size: 13px; font-weight: 700; color: var(--cream); letter-spacing: .01em; }
  .pop-head .hint { font-size: 11px; color: var(--taupe-dim); }
  .pop-body { padding: 4px 16px 16px; }

  .form { display: flex; flex-direction: column; gap: 12px; }
  .form .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form .row > * { flex: 1; min-width: 120px; }
  .form label.f {
    display: flex; flex-direction: column; gap: 5px;
    font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    color: var(--taupe);
  }
  .form label.f > input, .form label.f > select, .form label.f > textarea { width: 100%; }
  .form textarea { min-height: 150px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; resize: vertical; }
  .form .browse { font-size: 12px; color: var(--taupe-dim); text-align: center; padding: 2px 0; }
  .form .foot { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 2px; }

  .settings { display: flex; flex-direction: column; gap: 14px; }
  .settings label.check { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--sand); cursor: pointer; }
  .settings .desc { color: var(--taupe-dim); font-size: 12px; display: block; margin-top: 2px; }
  .settings input[type=checkbox] { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--rose); cursor: pointer; }
  .settings .foot { display: flex; align-items: center; gap: 12px; margin-top: 2px; }
  .saved { color: var(--rose); font-size: 13px; }

  /* ---- api keys panel ---- */
  .keys { display: flex; flex-direction: column; gap: 14px; }
  .keys .form { gap: 10px; }
  .keys .scopes { display: flex; gap: 16px; padding: 2px 0; }
  .keys .scopes label.check { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--sand); cursor: pointer; }
  .keys .scopes input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--rose); cursor: pointer; }
  .key-reveal {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; word-break: break-all;
    background: var(--field); border: 1px solid var(--rose); border-radius: 8px; padding: 10px; color: var(--cream-hi);
  }
  .key-list { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow: auto; }
  .key-row {
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
    padding: 9px 11px; border: 1px solid var(--rim-soft); border-radius: 9px; background: var(--cocoa);
  }
  .key-row.off { opacity: .55; }
  .key-row .kmeta { min-width: 0; }
  .key-row .kname { font-size: 13px; font-weight: 600; color: var(--sand); }
  .key-row.off .kname { text-decoration: line-through; }
  .key-row .ksub { font-size: 11px; color: var(--taupe-dim); font-family: ui-monospace, Menlo, monospace; margin-top: 2px; word-break: break-all; }
  .key-row .kacts { display: flex; gap: 4px; flex: none; }

  /* ---- search reveal (under the app bar) ---- */
  .searchbar {
    display: grid; grid-template-rows: 0fr; overflow: hidden; opacity: 0; margin-bottom: 0;
    transition: grid-template-rows .18s ease, margin .18s ease, opacity .18s ease;
  }
  .searchbar.open { grid-template-rows: 1fr; opacity: 1; margin-bottom: 18px; }
  .searchbar > div { min-height: 0; }
  .search-field { position: relative; }
  .search-field .ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; stroke: var(--taupe-dim); stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
  .search-field input { width: 100%; padding-left: 40px; }

  #list { margin-top: 30px; }
  .section-head { display: flex; align-items: baseline; gap: 10px; margin: 0 0 14px; }
  .section-head h2 { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--taupe); margin: 0; }
  .count { font-size: 12px; color: var(--taupe-dim); font-variant-numeric: tabular-nums; }

  .group { margin: 0; }
  .group-head {
    display: flex; align-items: center; gap: 9px; width: 100%;
    padding: 6px 4px; margin: 2px 0 6px; background: transparent; border: none;
    color: var(--cream); cursor: pointer; text-align: left;
  }
  .group-head:hover { color: var(--cream-hi); }
  .group-head.static { cursor: default; }
  .group-head.static:hover { color: var(--cream); }
  .group-head .caret { color: var(--taupe); font-size: 10px; transition: transform .15s; }
  .group.collapsed .group-head .caret { transform: rotate(-90deg); }
  .group-name { font-size: 13px; font-weight: 700; letter-spacing: .01em; }
  .group-name.muted { color: var(--taupe); font-weight: 600; }
  .group-count {
    font-size: 11px; color: var(--taupe-dim); background: var(--field);
    border: 1px solid var(--rim-soft); border-radius: 2em; padding: 1px 8px;
    font-variant-numeric: tabular-nums;
  }
  .group-items { display: flex; flex-direction: column; gap: 8px; }
  .group.collapsed .group-items { display: none; }

  /* view switch (grouped / list / grid) */
  .viewtoggle {
    display: flex; gap: 2px; margin-left: auto; padding: 2px;
    border: 1px solid var(--rim-soft); border-radius: 9px; background: var(--field);
  }
  .viewtoggle button {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 28px; padding: 0; background: transparent; border: none;
    border-radius: 6px; color: var(--taupe); cursor: pointer; transition: .12s;
  }
  .viewtoggle button:hover { color: var(--sand); background: var(--cocoa-hi); }
  .viewtoggle button.on { color: var(--cream); background: var(--cocoa-hi); }
  .viewtoggle svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* project label shown on rows in flat (list / grid) views */
  .proj-tag {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
    color: var(--cream); background: var(--cocoa-hi); border: 1px solid var(--rim-soft);
    border-radius: 2em; padding: 2px 10px; cursor: pointer; transition: .12s;
  }
  .proj-tag:hover { border-color: var(--rose); color: var(--cream-hi); }
  .proj-tag svg { width: 11px; height: 11px; stroke: var(--taupe); stroke-width: 2; fill: none; }

  #rows.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(240px, 28vw, 300px), 1fr)); gap: 12px; }
  #rows.grid .item { flex-direction: column; align-items: stretch; gap: 12px; }
  #rows.grid .item-actions { justify-content: flex-start; }

  .items { display: flex; flex-direction: column; gap: 8px; }
  .item {
    display: flex; align-items: center; gap: 16px; justify-content: space-between;
    padding: 13px 16px; border: 1px solid var(--rim-soft); border-radius: 12px;
    background: var(--cocoa); transition: border-color .15s, background .15s;
  }
  .item:hover { border-color: var(--rim); background: var(--cocoa-hi); }
  .item.off { opacity: .5; }
  .item-body { min-width: 0; flex: 1; }
  .item-line { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .slug { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; font-weight: 600; color: var(--rose); }
  .item.off .slug { text-decoration: line-through; }
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--taupe);
    background: var(--field); border: 1px solid var(--rim); border-radius: 5px; padding: 2px 6px;
  }
  .pill {
    font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    border-radius: 5px; padding: 2px 6px; border: 1px solid;
    color: var(--brick); border-color: var(--danger-rim); background: var(--danger-bg);
  }
  .pill.pill-lock { color: var(--taupe); border-color: var(--rim); background: transparent; }
  .item-title { font-size: 13px; color: var(--taupe); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .time { font-size: 11px; color: var(--taupe-dim); font-family: ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }

  .chip {
    display: inline-block; padding: 5px 12px; border-radius: 2em;
    background: var(--field); border: 1px solid var(--rim); color: var(--taupe);
    font-size: 11px; font-weight: 500; cursor: pointer; transition: .12s;
  }
  .chip:hover { color: var(--sand); border-color: var(--taupe); background: var(--field); }
  .chip.active { border-color: var(--rose); color: var(--cream); background: var(--rose-tint); }

  /* tag editor — type to add a chip, × to remove */
  .tagbox {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px; width: 100%;
    padding: 6px 8px; min-height: 40px; border: 1px solid var(--rim); border-radius: 9px;
    background: var(--field); cursor: text; transition: border-color .12s;
  }
  .tagbox.focus { border-color: var(--rose); outline: 2px solid var(--rose); outline-offset: 1px; }
  .tagbox .tagchip {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 5px 3px 10px;
    border-radius: 2em; background: var(--cocoa-hi); border: 1px solid var(--rim);
    color: var(--sand); font-size: 12px; line-height: 1;
  }
  .tagbox .tagchip button {
    display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px;
    padding: 0; margin: 0; background: transparent; border: none; border-radius: 50%;
    color: var(--taupe); cursor: pointer; font-size: 15px; line-height: 1; transition: .12s;
  }
  .tagbox .tagchip button:hover { background: var(--danger-bg); color: var(--brick); }
  .tagbox input { flex: 1; min-width: 90px; width: auto; padding: 4px 2px; border: none; background: transparent; outline: none; }
  .tagbox input:focus { outline: none; border: none; }

  .item-actions {
    display: flex; align-items: center; gap: 4px; flex: none; flex-wrap: wrap; justify-content: flex-end;
  }
  .act {
    display: inline-flex; align-items: center; min-height: 40px;
    background: transparent; border: 1px solid transparent; border-radius: 7px;
    color: var(--taupe); font-size: 12px; font-weight: 500; padding: 5px 11px; white-space: nowrap; transition: .12s;
  }
  .act:hover { color: var(--sand); background: var(--field); border-color: var(--rim); }
  .act.copy { color: var(--cream); border-color: var(--rim); }
  .act.copy:hover { background: var(--rose-tint); border-color: var(--rose); color: var(--cream); }
  .act.del { color: var(--brick); }
  .act.del:hover { background: var(--danger-bg); border-color: var(--danger-rim); color: var(--brick); }

  /* per-row dropdown menus (view + overflow) */
  .more { position: relative; display: inline-flex; }
  .act.more-btn { font-weight: 700; letter-spacing: 1px; padding: 5px 12px; }
  .menu {
    position: absolute; top: calc(100% + 6px); right: 0; z-index: 30;
    min-width: 168px; padding: 5px; display: none; flex-direction: column; gap: 2px;
    background: var(--cocoa-hi); border: 1px solid var(--rim); border-radius: 10px;
    box-shadow: 0 18px 44px -20px #000;
  }
  .more.open .menu { display: flex; }
  .menu .act { width: 100%; justify-content: flex-start; text-align: left; min-height: 36px; gap: 8px; }
  .menu .act::before { content: ""; width: 13px; flex: none; }
  .menu .act.on { color: var(--cream); }
  .menu .act.on::before { content: "✓"; }
  .menu .act:hover { background: var(--field); }

  .empty { padding: 26px; text-align: center; color: var(--taupe-dim); font-size: 13px; border: 1px dashed var(--rim-soft); border-radius: 12px; }

  /* ---- modal dialog (replaces native prompt/confirm) ---- */
  .dlg-scrim {
    position: fixed; inset: 0; z-index: 60; background: rgba(14, 8, 4, .55);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .dlg-scrim.open { display: flex; }
  .dialog {
    width: 380px; max-width: 100%; padding: 18px;
    background: var(--cocoa-hi); border: 1px solid var(--rim); border-radius: 14px;
    box-shadow: 0 26px 60px -28px #000;
  }
  .dialog h3 { margin: 0 0 6px; font-size: 14px; color: var(--cream); }
  .dialog p { margin: 0 0 12px; font-size: 13px; color: var(--taupe); line-height: 1.5; overflow-wrap: break-word; }
  .dialog input { width: 100%; }
  .dialog .choices { display: flex; flex-direction: column; gap: 4px; }
  .dialog .choices .act { width: 100%; justify-content: flex-start; text-align: left; gap: 8px; }
  .dialog .choices .act::before { content: ""; width: 13px; flex: none; }
  .dialog .choices .act.on { color: var(--cream); }
  .dialog .choices .act.on::before { content: "✓"; }
  .dialog .choices .act:hover { background: var(--field); }
  .dialog .foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  .dialog button.ghost {
    background: transparent; color: var(--taupe); border: 1px solid var(--rim); font-weight: 600;
  }
  .dialog button.ghost:hover { color: var(--sand); border-color: var(--taupe); background: transparent; }
  .dialog button.danger { background: var(--brick); color: #2A1108; }

  /* ---- toast ---- */
  #toast {
    position: fixed; left: 50%; bottom: 24px; z-index: 70;
    transform: translateX(-50%) translateY(8px);
    background: var(--cocoa-hi); border: 1px solid var(--rim); color: var(--sand);
    padding: 10px 16px; border-radius: 10px; font-size: 13px; max-width: 90vw;
    opacity: 0; pointer-events: none; transition: opacity .15s, transform .15s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.err { background: var(--danger-bg); border-color: var(--danger-rim); color: var(--brick); }

  @media (max-width: 560px) {
    .tagline { display: none; }
    .item { flex-direction: column; align-items: stretch; gap: 10px; }
    .item-actions { justify-content: flex-start; }
    /* actions stack to the left here, so open the menu rightward */
    .menu { left: 0; right: auto; }
  }
  @media (pointer: coarse) {
    .iconbtn { height: 44px; min-width: 44px; }
    .act { min-height: 44px; }
    .chip { padding: 8px 14px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>

<div id="app">
  <header>

      <button class="iconbtn" id="keysBtn" aria-label="API keys" aria-expanded="false" title="API keys">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M16.555 3.843l3.602 3.602a2.877 2.877 0 0 1 0 4.069l-2.643 2.643a2.877 2.877 0 0 1 -4.069 0l-.301 -.301l-6.558 6.558a2 2 0 0 1 -1.239 .578l-.175 .008h-1.977a1 1 0 0 1 -.993 -.883l-.007 -.117v-1.977a2 2 0 0 1 .467 -1.284l.119 -.13l.414 -.414h2v-2h2v-2l2.144 -2.144l-.301 -.301a2.877 2.877 0 0 1 0 -4.069l2.643 -2.643a2.877 2.877 0 0 1 4.069 0z"></path><path d="M15 9h.01"></path></svg>
      </button>
      <button class="iconbtn" id="logout" aria-label="Sign out" title="Sign out">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"></path><path d="M9 12h12l-3 -3"></path><path d="M18 15l3 -3"></path></svg>
      </button>

      <!-- compose popover, anchored under +New -->
      <div class="popover" id="composePop" role="dialog" aria-label="New artifact" aria-hidden="true">
        <div class="pop-head"><h3>New artifact</h3><span class="hint">esc to close</span></div>
        <div class="pop-body">
          <div class="form">
            <div class="row">
              <label class="f">Type
                <select id="type">
                  <option value="html">html</option>

                <select id="frame" title="Top viewer frame">

              <label class="f">Project
                <input id="project" placeholder="pick or type" list="projectOptions" autocomplete="off">
                <datalist id="projectOptions"></datalist>

            <label class="f">Content
              <textarea id="content" placeholder="Paste HTML, a React component with a default export, or Markdown…" spellcheck="false"></textarea>
            </label>
            <div class="browse">or <a href="#" id="browseLink">browse files</a> to upload instead</div>
            <div class="foot"><button id="publish">Publish</button></div>
          </div>
        </div>
      </div>

      <!-- settings popover, anchored under the gear -->
      <div class="popover" id="settingsPop" role="dialog" aria-label="Settings" aria-hidden="true">
        <div class="pop-head"><h3>Settings</h3></div>
        <div class="pop-body">
          <div class="settings">
            <label class="check">
              <input type="checkbox" id="frameEnabled">
              <span>Frame enabled globally<span class="desc">Master switch for the top viewer frame.</span></span>
            </label>
            <label class="check">
              <input type="checkbox" id="frameDefault">

            <label class="f">Reading font

                <label class="check"><input type="checkbox" id="scopeRead"><span>read</span></label>
                <label class="check"><input type="checkbox" id="scopePublish" checked><span>publish</span></label>
                <label class="check"><input type="checkbox" id="scopeFull"><span>full</span></label>

  </header>

  <div class="searchbar" id="searchbar">
    <div>
      <div class="search-field">
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path><path d="M21 21l-6 -6"></path></svg>

  <div id="drop">
    <strong>Drop files to publish</strong> &nbsp;·&nbsp; or click to browse
    <div class="hint">.html · .jsx · .tsx · .md · .zip. Published instantly, link copied to your clipboard.</div>
  </div>
  <input id="file" type="file" accept=".html,.htm,.jsx,.tsx,.md,.markdown,.zip" multiple hidden>

  <div id="results"></div>

  <div id="list">
    <div class="section-head">
      <h2>Published</h2><span class="count" id="count"></span>
      <div class="viewtoggle" role="group" aria-label="View mode">
        <button type="button" data-view="grouped" title="Group by project" aria-label="Group by project">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h5M4 9h11M4 15h5M4 19h11"/></svg>
        </button>
        <button type="button" data-view="list" title="Flat list, newest first" aria-label="Flat list">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <button type="button" data-view="grid" title="Grid, newest first" aria-label="Grid">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
        </button>
      </div>
    </div>
    <div class="items" id="rows"></div>

<!-- outside-click catcher for popovers -->
<div class="scrim" id="scrim"></div>

<!-- modal dialog (replaces native prompt/confirm) -->
<div class="dlg-scrim" id="dlgScrim">
  <div class="dialog" id="dialog" role="dialog" aria-modal="true"></div>
</div>

<!-- transient status / error messages -->
<div id="toast" role="status" aria-live="polite"></div>

<script>
  const $ = (id) => document.getElementById(id);

  // Auth is now a session cookie (set by /api/auth/login), sent automatically on
  // same-origin fetches — no bearer token in the browser anymore.
  const headers = () => ({ 'Content-Type': 'application/json' });

  const TYPE_BY_EXT = {
    html: 'html', htm: 'html',
    jsx: 'jsx', tsx: 'tsx',
    md: 'md', markdown: 'md',
  };

  // ---- login / setup ----

  let SETUP = false; // first-run: no admin exists yet → create one

  function showApp() {
    $('lock').style.display = 'none';
    $('app').style.display = 'block';
    loadList();
    loadConfig();
  }

  function showLock() {
    $('lock').style.display = 'flex';
    $('app').style.display = 'none';
    $('lockSub').textContent = SETUP ? 'Create the admin account' : 'Sign in';
    $('lockSubmit').textContent = SETUP ? 'Create account' : 'Sign in';
    $('lockPass').setAttribute('autocomplete', SETUP ? 'new-password' : 'current-password');
    $('lockUser').value = '';
    $('lockPass').value = '';
    $('lockError').textContent = '';
    $('lockUser').focus();
  }

  function shakeLock() {
    $('lockCard').classList.remove('shake');
    void $('lockCard').offsetWidth;
    $('lockCard').classList.add('shake');
  }

  async function submitAuth() {
    const username = $('lockUser').value.trim();
    const password = $('lockPass').value;
    if (!username || !password) return;
    $('lockError').textContent = '';
    try {
      const res = await fetch(SETUP ? '/api/auth/setup' : '/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      if (res.ok) {
        SETUP = false;
        showApp();
      } else {
        const d = await res.json().catch(() => ({}));
        $('lockError').textContent = d.error || 'Failed';
        shakeLock();
      }
    } catch {
      $('lockError').textContent = 'Network error';
      shakeLock();
    }
  }

  $('lockSubmit').addEventListener('click', submitAuth);
  $('lockUser').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('lockPass').focus(); });
  $('lockPass').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitAuth(); });
  $('logout').addEventListener('click', async () => {
    try { await fetch('/api/auth/logout', { method: 'POST' }); } catch {}
    SETUP = false;
    showLock();
  });

  // ---- publish helpers ----

  function slugify(filename) {
    const base = filename.replace(/\.[^.]+$/, '');
    let s = base.toLowerCase().replace(/[^a-z0-9-]+/g, '-').replace(/^-+|-+$/g, '');
    if (s.length < 3) s = s + '-' + Math.random().toString(36).slice(2, 6);
    return s.slice(0, 64);
  }

  async function publish(body) {
    const res = await fetch('/api/artifacts', { method: 'POST', headers: headers(), body: JSON.stringify(body) });
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  }

  function addResult(name, urlOrError, ok) {
    const div = document.createElement('div');
    div.className = 'result' + (ok ? '' : ' err');
    if (ok) {
      div.innerHTML = '<span class="name"></span><a target="_blank"></a><button>Copy</button>';
      div.querySelector('.name').textContent = name;
      const a = div.querySelector('a');
      a.href = urlOrError; a.textContent = urlOrError;
      div.querySelector('button').addEventListener('click', () => navigator.clipboard.writeText(urlOrError));
    } else {
      div.innerHTML = '<span class="name"></span><span class="msg"></span>';
      div.querySelector('.name').textContent = name;
      div.querySelector('.msg').textContent = urlOrError;
    }
    $('results').prepend(div);
  }

  async function publishZip(buf, slug, title) {
    const res = await fetch('/api/artifacts/zip?slug=' + encodeURIComponent(slug) +
      '&title=' + encodeURIComponent(title), {
      method: 'POST',
      headers: { 'Content-Type': 'application/zip' },
      body: buf,
    });
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  }

  async function publishFile(file) {
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const type = TYPE_BY_EXT[ext];
    if (!type && ext !== 'zip') {
      return addResult(file.name, 'Unsupported type .' + ext + ' (html/jsx/tsx/md/zip only)', false);
    }

    const isZip = ext === 'zip';
    const payload = isZip ? await file.arrayBuffer() : await file.text();
    const send = (slug) => isZip
      ? publishZip(payload, slug, file.name)
      : publish({ content: payload, type, slug, title: file.name });

    let slug = slugify(file.name);
    let r = await send(slug);
    if (r.status === 409) {
      slug = slug.slice(0, 59) + '-' + Math.random().toString(36).slice(2, 6);
      r = await send(slug);
    }
    if (r.ok) {
      addResult(file.name, r.data.url, true);
      navigator.clipboard.writeText(r.data.url).catch(() => {});
      loadList();
    } else {
      addResult(file.name, r.data.error || ('HTTP ' + r.status), false);
    }
  }

  // ---- drag & drop ----

  const drop = $('drop');
  drop.addEventListener('click', () => $('file').click());
  $('file').addEventListener('change', () => {
    [...$('file').files].forEach(publishFile);
    $('file').value = '';
  });

  let dragDepth = 0;
  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragDepth++;
    drop.classList.add('over');
  });
  document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    if (--dragDepth <= 0) { dragDepth = 0; drop.classList.remove('over'); }
  });
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragDepth = 0;
    drop.classList.remove('over');
    if ($('app').style.display === 'none' || !$('app').style.display) return;
    [...e.dataTransfer.files].forEach(publishFile);
  });

  // ---- paste form ----

  // Show the password box only when visibility is "password".
  $('visibility').addEventListener('change', () => {
    $('passwordWrap').style.display = $('visibility').value === 'password' ? '' : 'none';
  });

  $('publish').addEventListener('click', () => busy($('publish'), 'Publishing…', async () => {
    const body = { content: $('content').value, type: $('type').value };
    if ($('slug').value) body.slug = $('slug').value;
    if ($('title').value) body.title = $('title').value;
    if ($('frame').value !== 'default') body.frame = $('frame').value === 'on';
    const tagList = composeTags.getTags();
    if (tagList.length) body.tags = tagList;
    if ($('project').value.trim()) body.project = $('project').value.trim();
    body.visibility = $('visibility').value; // authoritative: what the select shows is what you get
    if ($('visibility').value === 'password') {
      if (!$('password').value) { toast('A view password is required.', true); return; }
      body.password = $('password').value;
    }
    const r = await publish(body);
    if (r.ok) {
      addResult('pasted ' + body.type, r.data.url, true);
      navigator.clipboard.writeText(r.data.url).catch(() => {});
      $('content').value = '';
      composeTags.setTags([]);
      $('project').value = '';
      $('password').value = '';
      $('visibility').value = 'private';
      $('passwordWrap').style.display = 'none';
      closePops();
      loadList();
    } else {
      addResult('pasted ' + body.type, r.data.error || ('HTTP ' + r.status), false);
    }
  }));

  // ---- list ----

  let allItems = [];
  const collapsed = new Set();
  let viewMode = 'grouped';
  try { viewMode = localStorage.getItem('artifacts:view') || 'grouped'; } catch {}

  async function loadList() {
    try {
      const res = await fetch('/api/artifacts', { headers: headers() });
      if (!res.ok) return;
      allItems = await res.json();
      refreshProjectOptions();
      renderList();
    } catch {}
  }

  // Distinct project names in use, newest-activity first, for the compose/edit combobox.
  function refreshProjectOptions() {
    const dl = $('projectOptions');
    if (!dl) return;
    const seen = new Map(); // name -> most recent timestamp
    for (const a of allItems) {
      if (!a.project) continue;
      const t = Date.parse(a.updatedAt || a.createdAt || '') || 0;
      seen.set(a.project, Math.max(seen.get(a.project) || 0, t));
    }
    const names = [...seen.keys()].sort((x, y) => seen.get(y) - seen.get(x));
    dl.innerHTML = '';
    for (const n of names) {
      const o = document.createElement('option');
      o.value = n;
      dl.appendChild(o);
    }
  }

  // A small tag editor: type + Enter/comma to add a chip, × to remove one, Backspace
  // on an empty field drops the last. Tags are normalized to the server rule
  // ([a-z0-9-], max 32) so the chips always show exactly what gets stored.
  function makeTagInput(box, initial) {
    let tags = [];
    const input = document.createElement('input');
    input.type = 'text';
    input.autocomplete = 'off';
    input.setAttribute('autocapitalize', 'none');
    input.spellcheck = false;
    const clean = (s) => s.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').replace(/^-+/, '').slice(0, 32);
    function render() {
      box.querySelectorAll('.tagchip').forEach((c) => c.remove());
      for (const t of tags) {
        const chip = document.createElement('span');
        chip.className = 'tagchip';
        chip.appendChild(document.createTextNode(t));
        const x = document.createElement('button');
        x.type = 'button';
        x.textContent = '×';
        x.setAttribute('aria-label', 'Remove tag ' + t);
        x.addEventListener('click', (e) => { e.preventDefault(); tags = tags.filter((v) => v !== t); render(); input.focus(); });
        chip.appendChild(x);
        box.insertBefore(chip, input);
      }
      input.placeholder = tags.length ? 'add…' : 'type a tag, press Enter';
    }
    function add(raw) { const t = clean(raw); if (t && !tags.includes(t)) tags.push(t); }
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); add(input.value); input.value = ''; render(); }
      else if (e.key === 'Backspace' && !input.value && tags.length) { tags.pop(); render(); }
    });
    input.addEventListener('focus', () => box.classList.add('focus'));
    input.addEventListener('blur', () => { box.classList.remove('focus'); if (input.value.trim()) { add(input.value); input.value = ''; render(); } });
    box.addEventListener('mousedown', (e) => { if (e.target === box) { e.preventDefault(); input.focus(); } });
    box.appendChild(input);
    tags = (initial || []).map(clean).filter((v, i, a) => v && a.indexOf(v) === i);
    render();
    return {
      getTags: () => tags.slice(),
      setTags: (arr) => { tags = (arr || []).map(clean).filter((v, i, a) => v && a.indexOf(v) === i); render(); },
    };
  }
  const composeTags = makeTagInput($('tags'), []);

  function matchItem(a, q) {
    return (a.slug && a.slug.toLowerCase().includes(q))
      || (a.title && a.title.toLowerCase().includes(q))
      || (a.type && a.type.toLowerCase().includes(q))
      || (a.project && a.project.toLowerCase().includes(q))
      || (a.tags || []).some((t) => t.toLowerCase().includes(q));
  }

  function showEmpty(text) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = text;
    $('rows').appendChild(empty);
  }

  function pill(text, variant) {
    const s = document.createElement('span');
    s.className = variant ? 'pill ' + variant : 'pill';
    s.textContent = text;
    return s;
  }

  function actBtn(text, cls) {
    const b = document.createElement('button');
    b.className = 'act ' + cls;
    if (text) b.textContent = text;
    return b;
  }

  function flash(btn, text) {
    const prev = btn.textContent;
    btn.textContent = text;
    setTimeout(() => { btn.textContent = prev; }, 1200);
  }

  function toast(msg, isError) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.toggle('err', !!isError);
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove('show'), 3200);
  }

  // Disable a button and swap its label while an async action runs.
  async function busy(btn, label, fn) {
    if (btn.classList.contains('busy')) return;
    const prev = btn.textContent;
    btn.classList.add('busy');
    if (label) btn.textContent = label;
    try {
      return await fn();
    } finally {
      btn.classList.remove('busy');
      btn.textContent = prev;
    }
  }

  // Styled replacement for prompt()/confirm(). Returns a promise:
  //   input mode   → entered string, or null on cancel
  //   choices mode → chosen value, or null on cancel
  //   confirm mode → true, or null on cancel
  let dlgClose = null;
  function dialog(opts) {
    return new Promise((resolve) => {
      const scrim = $('dlgScrim');
      const box = $('dialog');
      box.innerHTML = '';
      let done = false;
      const finish = (v) => {
        if (done) return;
        done = true;
        scrim.classList.remove('open');
        document.removeEventListener('keydown', onKey, true);
        dlgClose = null;
        resolve(v);
      };
      dlgClose = finish;
      const onKey = (e) => {
        if (e.key === 'Escape') { e.stopPropagation(); finish(null); }
      };

      const h = document.createElement('h3');
      h.textContent = opts.title;
      box.appendChild(h);
      if (opts.body) {
        const p = document.createElement('p');
        p.textContent = opts.body;
        box.appendChild(p);
      }

      let input = null;
      let readValue = () => true; // what Save resolves to
      if (opts.choices) {
        const wrap = document.createElement('div');
        wrap.className = 'choices';
        for (const c of opts.choices) {
          const b = actBtn(c.label, c.value === opts.current ? 'on' : '');
          b.addEventListener('click', () => finish(c.value));
          wrap.appendChild(b);
        }
        box.appendChild(wrap);
      } else if (opts.tags) {
        const tagbox = document.createElement('div');
        tagbox.className = 'tagbox';
        box.appendChild(tagbox);
        const ti = makeTagInput(tagbox, opts.value || []);
        input = tagbox.querySelector('input');
        readValue = () => ti.getTags();
      } else if (opts.input) {
        input = document.createElement('input');
        input.type = opts.password ? 'password' : 'text';
        input.value = opts.value || '';
        if (opts.placeholder) input.placeholder = opts.placeholder;
        if (opts.list) { input.setAttribute('list', opts.list); input.autocomplete = 'off'; }
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') finish(input.value); });
        box.appendChild(input);
        readValue = () => input.value;
      }

      const foot = document.createElement('div');
      foot.className = 'foot';
      const cancel = document.createElement('button');
      cancel.className = 'ghost';
      cancel.textContent = 'Cancel';
      cancel.addEventListener('click', () => finish(null));
      foot.appendChild(cancel);
      if (!opts.choices) {
        const ok = document.createElement('button');
        if (opts.danger) ok.className = 'danger';
        ok.textContent = opts.confirmText || 'Save';
        ok.addEventListener('click', () => finish(readValue()));
        foot.appendChild(ok);
      }
      box.appendChild(foot);

      document.addEventListener('keydown', onKey, true);
      scrim.classList.add('open');
      const target = input || box.querySelector('.choices .act.on') || cancel;
      setTimeout(() => target.focus(), 30);
    });
  }
  $('dlgScrim').addEventListener('click', (e) => {
    if (e.target === $('dlgScrim') && dlgClose) dlgClose(null);
  });

  // Apply a change optimistically: update the local item, re-render, then send
  // the PATCH. On failure, restore the previous item and explain in a toast.
  async function patchItem(a, body, local) {
    const idx = allItems.findIndex((x) => x.slug === a.slug);
    if (idx < 0) return;
    const prev = allItems[idx];
    allItems[idx] = { ...prev, ...local, updatedAt: new Date().toISOString() };
    refreshProjectOptions();
    renderList();
    try {
      const res = await fetch('/api/artifacts/' + a.slug, {
        method: 'PATCH', headers: headers(), body: JSON.stringify(body),
      });
      const d = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(d.error || 'update failed');
      if (d.slug && d.slug !== allItems[idx].slug) {
        allItems[idx] = { ...allItems[idx], slug: d.slug };
        renderList();
      }
      return d;
    } catch (err) {
      allItems[idx] = prev;
      refreshProjectOptions();
      renderList();
      toast(err.message || 'update failed', true);
    }
  }

  function renderList() {
    // drop collapse state for projects that no longer exist (renamed / cleared)
    const live = new Set(allItems.map((a) => a.project || ''));
    for (const k of collapsed) if (!live.has(k)) collapsed.delete(k);
    const q = ($('search').value || '').trim().toLowerCase();
    const filtered = q ? allItems.filter((a) => matchItem(a, q)) : allItems.slice();

    $('count').textContent = allItems.length
      ? (q ? filtered.length + ' of ' + allItems.length
           : allItems.length + (allItems.length === 1 ? ' artifact' : ' artifacts'))
      : '';

    const rows = $('rows');
    rows.innerHTML = '';
    rows.classList.toggle('grid', viewMode === 'grid');

    if (!allItems.length) return showEmpty('Nothing published yet. Drop a file above to start.');
    if (!filtered.length) return showEmpty('No matches for “' + q + '”.');

    const hasProjects = allItems.some((a) => a.project);

    // Grouped view — one section per project. Only meaningful once a project is in use.
    if (viewMode === 'grouped' && hasProjects) {
      const groups = new Map();
      for (const a of filtered) {
        const key = a.project || '';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(a);
      }
      // Newest item inside each group, used to order the groups by recent activity.
      const recency = (items) => items.reduce((m, a) => Math.max(m, ts(a)), 0);
      for (const items of groups.values()) items.sort(byNewest);
      // Most recently touched project first; "No project" is no longer pinned to the bottom.
      const keys = [...groups.keys()].sort((x, y) => recency(groups.get(y)) - recency(groups.get(x)));
      for (const key of keys) rows.appendChild(buildGroup(key, groups.get(key), !!q));
      return;
    }

    // Flat views (list + grid) — everything newest first, project shown per row.
    for (const a of filtered.sort(byNewest)) rows.appendChild(buildItem(a, { showProject: hasProjects }));
  }

  const ts = (a) => Date.parse(a.updatedAt || a.createdAt || '') || 0;
  const byNewest = (a, b) => ts(b) - ts(a);

  function buildGroup(key, items, searching) {
    const sec = document.createElement('section');
    sec.className = 'group' + (!searching && collapsed.has(key) ? ' collapsed' : '');
    // While searching, groups are force-expanded, so the header is a static
    // label (no caret / no toggle) rather than a control that does nothing.
    const head = document.createElement(searching ? 'div' : 'button');
    head.className = 'group-head' + (searching ? ' static' : '');
    if (!searching) {
      const caret = document.createElement('span');
      caret.className = 'caret'; caret.textContent = '▾';
      head.appendChild(caret);
    }
    const name = document.createElement('span');
    name.className = 'group-name' + (key ? '' : ' muted');
    name.textContent = key || 'No project';
    const count = document.createElement('span');
    count.className = 'group-count'; count.textContent = items.length;
    head.append(name, count);
    if (!searching) {
      head.setAttribute('aria-expanded', collapsed.has(key) ? 'false' : 'true');
      head.addEventListener('click', () => {
        if (collapsed.has(key)) collapsed.delete(key); else collapsed.add(key);
        renderList();
      });
    }
    const box = document.createElement('div');
    box.className = 'group-items';
    for (const a of items) box.appendChild(buildItem(a));
    sec.append(head, box);
    return sec;
  }

  function buildItem(a, opts) {
      opts = opts || {};
      const expired = a.expiresAt && Date.parse(a.expiresAt) <= Date.now();
      const item = document.createElement('div');
      item.className = 'item' + ((a.disabled || expired) ? ' off' : '');

      const body = document.createElement('div');
      body.className = 'item-body';

      // line 1 — slug, type badge, state pills
      const line = document.createElement('div');
      line.className = 'item-line';
      const link = document.createElement('a');
      link.className = 'slug'; link.target = '_blank';
      link.href = '/a/' + a.slug; link.textContent = a.slug;
      line.appendChild(link);
      const badge = document.createElement('span');
      badge.className = 'badge'; badge.textContent = a.type;
      line.appendChild(badge);
      if (a.disabled) line.appendChild(pill('disabled'));
      if (expired) line.appendChild(pill('expired'));
      if (a.visibility === 'private') line.appendChild(pill('private', 'pill-lock'));
      if (a.visibility === 'password') line.appendChild(pill('password', 'pill-lock'));
      body.appendChild(line);

      // line 2 — title (only when it differs from the slug)
      if (a.title && a.title !== a.slug) {
        const t = document.createElement('div');
        t.className = 'item-title'; t.textContent = a.title;
        body.appendChild(t);
      }

      // line 3 — project label (flat views only), tag chips, timestamp
      const meta = document.createElement('div');
      meta.className = 'item-meta';
      if (opts.showProject && a.project) {
        const pt = document.createElement('button');
        pt.type = 'button';
        pt.className = 'proj-tag';
        pt.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
        pt.appendChild(document.createTextNode(a.project));
        pt.title = 'Filter to project “' + a.project + '”';
        pt.addEventListener('click', () => { $('search').value = a.project; renderList(); });
        meta.appendChild(pt);
      }
      for (const t of a.tags || []) {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = t;
        chip.addEventListener('click', () => { $('search').value = t; renderList(); });
        meta.appendChild(chip);
      }
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = (a.updatedAt || '').slice(0, 16).replace('T', ' ');
      meta.appendChild(time);
      body.appendChild(meta);

      // actions — Copy, View, and a ⋯ menu holding everything else
      const actions = document.createElement('div');
      actions.className = 'item-actions';

      const nonPublic = a.visibility === 'private' || a.visibility === 'password';
      const copy = actBtn('Copy', 'copy');
      copy.title = 'Copy the share link';
      copy.addEventListener('click', async () => {
        const ok = await busy(copy, 'Copying…', async () => {
          try {
            // Public: the bare link is the share link. Non-public: mint a fresh capability
            // link (?k=…) on demand so the token is never persisted in the list rows.
            let link = location.origin + '/a/' + a.slug + (a.type === 'zip' ? '/' : '');
            if (nonPublic) {
              const res = await fetch('/api/artifacts/' + a.slug + '/link', { headers: headers() });
              if (!res.ok) throw new Error();
              link = (await res.json()).url;
            }
            await navigator.clipboard.writeText(link);
            return true;
          } catch {
            return false;
          }
        });
        flash(copy, ok ? 'Copied' : 'Copy failed');
      });

      // dropdown builder shared by the View menu and the ⋯ menu
      function dropdown(btnLabel, btnCls, fill) {
        const wrap = document.createElement('div');
        wrap.className = 'more';
        const btn = actBtn(btnLabel, btnCls);
        btn.setAttribute('aria-haspopup', 'true');
        btn.setAttribute('aria-expanded', 'false');
        const menu = document.createElement('div');
        menu.className = 'menu';
        wrap.append(btn, menu);
        btn.addEventListener('click', () => {
          const open = wrap.classList.toggle('open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
          if (open && !menu.childElementCount) fill(menu);
        });
        return { wrap, btn, menu };
      }

      function menuItem(menu, label, cls, onPick) {
        const b = actBtn(label, cls);
        b.addEventListener('click', () => { closeMenu(menu.parentElement); onPick(); });
        menu.appendChild(b);
        return b;
      }

      // View — explicit choice menu; changing visibility is never a blind cycle
      const vstate = a.visibility === 'private' ? 'private' : a.visibility === 'password' ? 'password' : 'public';
      const view = dropdown('View: ' + vstate, 'vis', (menu) => {
        const pick = (value, label) => menuItem(menu, label, value === vstate ? 'on' : '', async () => {
          if (value === vstate) return;
          if (value === 'password') {
            const pw = await dialog({
              title: 'Password-protect “' + a.slug + '”',
              body: 'Viewers need this shared password to open the artifact.',
              input: true, password: true, placeholder: 'View password', confirmText: 'Protect',
            });
            if (!pw) return;
            patchItem(a, { visibility: 'password', password: pw }, { visibility: 'password' });
            return;
          }
          if (value === 'public' && nonPublic) {
            const ok = await dialog({
              title: 'Make “' + a.slug + '” public?',
              body: 'Anyone with the bare link can view it. Existing capability links keep working.',
              confirmText: 'Make public',
            });
            if (!ok) return;
          }
          patchItem(a, { visibility: value }, { visibility: value });
        });
        pick('private', 'Private');
        pick('public', 'Public');
        pick('password', 'Password…');
      });
      view.btn.title = 'Change who can view this artifact';

      const fstate = a.frame === true ? 'on' : a.frame === false ? 'off' : 'auto';
      const more = dropdown('⋯', 'more-btn', (menu) => {
        menuItem(menu, 'Frame: ' + fstate + '…', '', async () => {
          const v = await dialog({
            title: 'Top frame for “' + a.slug + '”',
            body: 'The slim viewer toolbar shown above the artifact.',
            choices: [
              { value: 'auto', label: 'Auto (follow the global default)' },
              { value: 'on', label: 'On' },
              { value: 'off', label: 'Off' },
            ],
            current: fstate,
          });
          if (v === null || v === fstate) return;
          patchItem(a, { frame: v === 'auto' ? null : v === 'on' },
            { frame: v === 'auto' ? undefined : v === 'on' });
        });

        menuItem(menu, 'Tags…', '', async () => {
          const v = await dialog({
            title: 'Tags for “' + a.slug + '”',
            body: 'Type a tag and press Enter. Click × to remove one. Empty clears all.',
            tags: true, value: (a.tags || []),
          });
          if (v === null) return;
          patchItem(a, { tags: v }, { tags: v.length ? v : undefined });
        });

        menuItem(menu, 'Project…', '', async () => {
          const v = await dialog({
            title: 'Project for “' + a.slug + '”',
            body: 'Groups this artifact in the list. Pick an existing project or type a new one. Empty clears it.',
            input: true, value: a.project || '', list: 'projectOptions', placeholder: 'pick or type',
          });
          if (v === null) return;
          patchItem(a, { project: v.trim() }, { project: v.trim() || undefined });
        });

        menuItem(menu, 'Rename…', '', async () => {
          const v = await dialog({
            title: 'Rename “' + a.slug + '”',
            body: 'Changes the URL. Old links to this artifact stop working.',
            input: true, value: a.slug, confirmText: 'Rename',
          });
          if (!v || v === a.slug) return;
          patchItem(a, { slug: v }, {});
        });

        menuItem(menu, a.expiresAt ? 'Expiry: ' + a.expiresAt.slice(0, 10) + '…' : 'Expiry…', '', async () => {
          const v = await dialog({
            title: 'Expiry for “' + a.slug + '”',
            body: 'e.g. 2026-08-01 or 2026-08-01T12:00. Leave empty to clear.',
            input: true, value: a.expiresAt ? a.expiresAt.slice(0, 16) : '',
          });
          if (v === null) return;
          patchItem(a, { expiresAt: v.trim() || null }, { expiresAt: v.trim() || undefined });
        });

        // Rotate the share link — only meaningful for a private/password artifact. A single
        // epoch bump invalidates every link already handed out and every live unlock cookie.
        if (nonPublic) {
          menuItem(menu, 'Rotate link', '', async () => {
            const ok = await dialog({
              title: 'Rotate the link for “' + a.slug + '”?',
              body: 'Every link you have already shared stops working. A new link is copied to your clipboard.',
              confirmText: 'Rotate', danger: true,
            });
            if (!ok) return;
            const d = await patchItem(a, { rotateToken: true }, {});
            if (d && d.url) {
              await navigator.clipboard.writeText(d.url).catch(() => {});
              toast('Link rotated. New link copied.');
            }
          });
        }

        menuItem(menu, a.disabled ? 'Enable' : 'Disable', '', () => {
          patchItem(a, { disabled: !a.disabled }, { disabled: !a.disabled || undefined });
        });

        menuItem(menu, 'Delete', 'del', async () => {
          const ok = await dialog({
            title: 'Delete “' + a.slug + '”?',
            body: 'This permanently removes the artifact.',
            confirmText: 'Delete', danger: true,
          });
          if (!ok) return;
          try {
            const res = await fetch('/api/artifacts/' + a.slug, { method: 'DELETE', headers: headers() });
            if (!res.ok) throw new Error();
            allItems = allItems.filter((x) => x.slug !== a.slug);
            renderList();
          } catch {
            toast('Delete failed.', true);
          }
        });
      });
      more.btn.title = 'More actions';

      actions.append(copy, view.wrap, more.wrap);
      item.append(body, actions);
      return item;
  }

  let searchT;
  $('search').addEventListener('input', () => {
    clearTimeout(searchT);
    searchT = setTimeout(renderList, 120);
  });

  // view switch (grouped / list / grid), remembered across sessions
  function setView(mode) {
    viewMode = mode;
    try { localStorage.setItem('artifacts:view', mode); } catch {}
    document.querySelectorAll('.viewtoggle button').forEach((b) => b.classList.toggle('on', b.dataset.view === mode));
    renderList();
  }
  document.querySelectorAll('.viewtoggle button').forEach((b) => {
    b.classList.toggle('on', b.dataset.view === viewMode);
    b.addEventListener('click', () => setView(b.dataset.view));
  });

  function closeMenu(m) {
    m.classList.remove('open');
    const btn = m.querySelector('[aria-haspopup]');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  }

  // close any open row menu on outside click or Escape
  document.addEventListener('click', (e) => {
    document.querySelectorAll('.more.open').forEach((m) => {
      if (!m.contains(e.target)) closeMenu(m);
    });
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') document.querySelectorAll('.more.open').forEach(closeMenu);
  });

  // ---- settings (global config) ----

  async function loadConfig() {
    try {
      const res = await fetch('/api/config', { headers: headers() });
      if (!res.ok) return;
      const cfg = await res.json();
      $('frameEnabled').checked = !!(cfg.frame && cfg.frame.enabled);
      $('frameDefault').checked = !!(cfg.frame && cfg.frame.default);
      if (cfg.md) {
        $('mdFont').value = cfg.md.font;
        $('mdWidth').value = cfg.md.width;
        $('mdSize').value = cfg.md.size;
        $('mdTheme').value = cfg.md.theme;
      }
    } catch {}
  }

  $('saveSettings').addEventListener('click', () => busy($('saveSettings'), 'Saving…', async () => {
    const body = {
      frame: { enabled: $('frameEnabled').checked, default: $('frameDefault').checked },
      md: {
        font: $('mdFont').value,
        width: $('mdWidth').value,
        size: $('mdSize').value,
        theme: $('mdTheme').value,
      },
    };
    const el = $('settingsSaved');
    el.textContent = '';
    try {
      const res = await fetch('/api/config', { method: 'PUT', headers: headers(), body: JSON.stringify(body) });
      if (res.ok) {
        el.textContent = 'Saved';
        setTimeout(() => { el.textContent = ''; }, 1500);
      } else {
        const d = await res.json().catch(() => ({}));
        el.textContent = d.error || 'Save failed';
      }
    } catch {
      el.textContent = 'Save failed';
    }
  }));

  // ---- api keys ----

  async function loadKeys() {
    try {
      const res = await fetch('/api/keys');
      if (!res.ok) return;
      renderKeys(await res.json());
    } catch {}
  }

  function renderKeys(keys) {
    const box = $('keyList');
    box.innerHTML = '';
    if (!keys.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = 'No keys yet. Create one for your CLI or MCP client.';
      box.appendChild(e);
      return;
    }
    for (const k of keys) box.appendChild(buildKeyRow(k));
  }

  function buildKeyRow(k) {
    const row = document.createElement('div');
    row.className = 'key-row' + (k.disabled ? ' off' : '');

    const meta = document.createElement('div');
    meta.className = 'kmeta';
    const name = document.createElement('div');
    name.className = 'kname';
    name.textContent = k.name + ' · ' + k.scopes.join('/');
    const sub = document.createElement('div');
    sub.className = 'ksub';
    const bits = [k.prefix + '…'];
    if (k.expiresAt) bits.push('expires ' + k.expiresAt.slice(0, 10));
    bits.push(k.lastUsedAt ? ('used ' + k.lastUsedAt.slice(0, 10)) : 'never used');
    sub.textContent = bits.join(' · ');
    meta.append(name, sub);

    const acts = document.createElement('div');
    acts.className = 'kacts';
    const tgl = actBtn(k.disabled ? 'Enable' : 'Disable', 'tgl');
    tgl.addEventListener('click', async () => {
      await fetch('/api/keys/' + k.id, {
        method: 'PATCH', headers: headers(), body: JSON.stringify({ disabled: !k.disabled }),
      });
      loadKeys();
    });
    const del = actBtn('Revoke', 'del');
    del.addEventListener('click', async () => {
      const ok = await dialog({
        title: 'Revoke “' + k.name + '”?',
        body: 'Any CLI or MCP client using this key stops working.',
        confirmText: 'Revoke', danger: true,
      });
      if (!ok) return;
      await fetch('/api/keys/' + k.id, { method: 'DELETE' });
      loadKeys();
    });
    acts.append(tgl, del);

    row.append(meta, acts);
    return row;
  }

  $('createKey').addEventListener('click', () => busy($('createKey'), 'Creating…', async () => {
    const name = $('keyName').value.trim();
    const scopes = [];
    if ($('scopeRead').checked) scopes.push('read');
    if ($('scopePublish').checked) scopes.push('publish');
    if ($('scopeFull').checked) scopes.push('full');
    const expiresAt = $('keyExpiry').value.trim();
    const reveal = $('keyReveal');
    reveal.hidden = true;
    reveal.textContent = '';
    try {
      const res = await fetch('/api/keys', {
        method: 'POST', headers: headers(),
        body: JSON.stringify({ name, scopes, expiresAt: expiresAt || undefined }),
      });
      const d = await res.json().catch(() => ({}));
      reveal.hidden = false;
      if (res.ok) {
        reveal.textContent = 'Copied to clipboard, shown once: ' + d.key;
        navigator.clipboard.writeText(d.key).catch(() => {});
        $('keyName').value = '';
        $('keyExpiry').value = '';
        loadKeys();
      } else {
        reveal.textContent = d.error || 'Create failed';
      }
    } catch {
      reveal.hidden = false;
      reveal.textContent = 'Network error';
    }
  }));

  // ---- app bar popovers + search reveal ----

  const POPS = {
    compose: ['composePop', 'newBtn'],
    settings: ['settingsPop', 'settingsBtn'],
    keys: ['keysPop', 'keysBtn'],
  };

  function closePops() {
    for (const [pop, btn] of Object.values(POPS)) {
      $(pop).classList.remove('open');
      $(pop).setAttribute('aria-hidden', 'true');
      $(btn).classList.remove('on');
      $(btn).setAttribute('aria-expanded', 'false');
    }
    $('scrim').classList.remove('open');
  }

  function togglePop(name) {
    const [pop, btn] = POPS[name];
    const wasOpen = $(pop).classList.contains('open');
    closePops();
    if (wasOpen) return;
    $(pop).classList.add('open');
    $(pop).setAttribute('aria-hidden', 'false');
    $(btn).classList.add('on');
    $(btn).setAttribute('aria-expanded', 'true');
    $('scrim').classList.add('open');
    const first = $(pop).querySelector('input, select, textarea');
    if (first) setTimeout(() => first.focus(), 60);
  }

  function toggleSearch(force) {
    const open = force !== undefined ? force : !$('searchbar').classList.contains('open');
    $('searchbar').classList.toggle('open', open);
    $('searchBtn').classList.toggle('on', open);
    $('searchBtn').setAttribute('aria-expanded', open ? 'true' : 'false');
    if (open) setTimeout(() => $('search').focus(), 60);
  }

  $('newBtn').addEventListener('click', () => togglePop('compose'));
  $('settingsBtn').addEventListener('click', () => togglePop('settings'));
  $('keysBtn').addEventListener('click', () => { togglePop('keys'); loadKeys(); });
  $('searchBtn').addEventListener('click', () => toggleSearch());
  $('browseLink').addEventListener('click', (e) => { e.preventDefault(); $('file').click(); });
  $('scrim').addEventListener('click', closePops);
  // keep popovers from closing when interacting inside them
  document.querySelectorAll('.popover').forEach((p) => p.addEventListener('click', (e) => e.stopPropagation()));
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Escape') return;
    closePops();
    if ($('searchbar').classList.contains('open') && !$('search').value) toggleSearch(false);
  });

  // ---- boot ----

  (async () => {
    try {
      const s = await fetch('/api/auth/session').then((r) => r.json());
      if (s.authenticated) return showApp();
      SETUP = !!s.needsSetup;
    } catch {}
    showLock();
  })();
</script>
</body>
</html>
